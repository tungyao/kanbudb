name: CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: cmake -B build -DKANBUDB_BUILD_TESTS=ON
      - run: cmake --build build
      - run: ctest --test-dir build --output-on-failure
